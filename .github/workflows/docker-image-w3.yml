name: Publish W3 Docker image

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: docker-image-w3-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/acore2026/new-api-hw

jobs:
  build_and_push:
    name: Build & push W3 image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve image tags
        id: tags
        run: |
          SHORT_SHA="${GITHUB_SHA::12}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "VERSION=w3-${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "w3-${SHORT_SHA}" > VERSION

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=w3
            type=raw,value=w3-${{ steps.tags.outputs.short_sha }}

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Image summary
        run: |
          echo "### W3 Docker image" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${IMAGE_NAME}:w3" >> "$GITHUB_STEP_SUMMARY"
          echo "${IMAGE_NAME}:w3-${{ steps.tags.outputs.short_sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.build.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
